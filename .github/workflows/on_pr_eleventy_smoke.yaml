---
name: "Eleventy Site Build Smoke Test"
on:
  pull_request:
    branches:
      - master
      - main
    paths:
      - '.eleventy.js'
      - '.eleventyignore'
      - '_config.yml'
      - 'webpack.config.js'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '_posts/**'
      - 'content/**'
      - '_includes/**'
      - '_data/**'
      - 'galleries/**'
      - 'navigation_and_indexes/**'
      - 'assets/**'
      - 'products/**'
      - 'index.md'
      - 'tests/smoke/**'
      - '.github/workflows/on_pr_eleventy_smoke.yaml'

jobs:
  eleventy_smoke_test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build webpack bundle
        run: npm run dist

      - name: Run eleventy smoke test
        id: smoke_test
        run: npm run test:smoke:eleventy

      - name: Update PR comment with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const outcome = '${{ steps.smoke_test.outcome }}';
            const status = outcome === 'success' ? '✅ Passed' : '❌ Failed';
            const buildTime = '${{ steps.smoke_test.outputs.build_time }}' || 'N/A';
            const siteSize = '${{ steps.smoke_test.outputs.site_size }}' || 'N/A';
            const fileCount = '${{ steps.smoke_test.outputs.file_count }}' || 'N/A';

            const commentBody = [
              '## 🏗️ Eleventy Site Build Smoke Test',
              '',
              '| | |',
              '|---|---|',
              `| **Status** | ${status} |`,
              `| **Build Time** | ${buildTime} |`,
              `| **Site Size** | ${siteSize} |`,
              `| **HTML Files** | ${fileCount} |`,
              '',
              `_Updated: ${new Date().toUTCString()}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('🏗️ Eleventy Site Build Smoke Test'),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
              console.log('Updated existing comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
              console.log('Created new comment');
            }
