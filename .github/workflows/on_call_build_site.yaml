---
on:
  workflow_call:
    inputs:
      push_tag:
        description: 'Tag to push the base image with (optional)'
        required: false
        type: string

jobs:
  build_site:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      CACHE_IMAGE: orionrobots/orionrobots-site
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Login to Docker
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build base image
        env:
          push_tag: ${{inputs.push_tag || 'temp' }}
        run: |
          docker build --target base -t "ghcr.io/orionrobots/orionrobots-site.base:${push_tag}" .

      - name: Build the site with docker compose
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --build build

      - name: Tarball the site
        run: |
          tar -czf _site.tar.gz _site

      - name: upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: _site
          path: _site.tar.gz
          if-no-files-found: error

      - name: upload httpd.conf artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: httpd.conf
          path: .github/scripts/staging/httpd.conf
          if-no-files-found: error

      - name: Push base image
        if: inputs.push_tag
        env:
          push_tag: ${{inputs.push_tag }}
        run: |
          docker push "ghcr.io/orionrobots/orionrobots-site.base:${push_tag}"
